<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Week Tracker</title>
<style>
    @font-face {
        font-family: 'MV Boli';
        src: url('mvboli.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }

    body {
        font-family: 'MV Boli', cursive;
        margin: 0;
        padding: 12px;
        background: #000;
        color: #fff;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        line-height: 1.4;
    }
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 12px;
        border-bottom: 1px solid #333;
    }
    button {
        padding: 12px 24px;
        background: #000;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        touch-action: manipulation;
    }
    button:active { background: #444; }
    button:focus { outline: none; }
    h2 { margin: 0; font-size: 18px; font-weight: 500; }
    .day {
        margin-bottom: 12px;
        display: flex;
        flex-direction: column;
    }
    .day.collapsed textarea {
        display: none;
    }
        .header {
        font-size: clamp(20px, 5vh, 108px);
        font-weight: 600;
        margin-bottom: 4px;
        color: #fff;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
    }
    .today .header {
        color: #39FF14;
        text-shadow: 0 0 10px #39FF14, 0 0 20px rgba(57, 255, 20, 0.5);
    }
    textarea {
        width: 100%;
        box-sizing: border-box;
        background: #000;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 12px;
        min-height: 80px;
        font-family: inherit;
        font-size: 16px;
        resize: vertical;
        -webkit-appearance: none;
        outline: none;
    }
    textarea:focus {
        outline: none;
    }
    textarea:active {
        outline: none;
    }

    @keyframes slideLeft {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideRight {
        from { transform: translateX(-100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    .animate-left {
        animation: slideLeft 0.3s ease-out;
    }

    .animate-right {
        animation: slideRight 0.3s ease-out;
    }
</style>
</head>
<body>


<main id="week-grid"></main>

<script>
    const grid = document.getElementById('week-grid');
    let viewDate = new Date();

    let currentDirection = null;
    let touchStartX = 0;
    let touchEndX = 0;

    function handleGesture() {
        if (touchEndX< touchStartX - 50) {
            // Swipe left -> Next week
            viewDate.setDate(viewDate.getDate() + 7);
            currentDirection = 'left';
            render();
        }
        if (touchEndX > touchStartX + 50) {
            // Swipe right -> Previous week
            viewDate.setDate(viewDate.getDate() - 7);
            currentDirection = 'right';
            render();
        }
    }

// ... existing code above ...
    let tapCount = 0;
    let lastTapTime = 0;

    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
        const currentTime = Date.now();
        const tapGap = currentTime - lastTapTime;

        if (tapGap< 300) {
                tapCount++;
            } else {
                tapCount = 1;
            }

            lastTapTime = currentTime;

            if (tapCount === 3) {
                window.location.reload();
                tapCount = 0;
                return;
            }
        });

    document.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        // Only trigger swipe if the finger actually moved (skip taps)
        if (Math.abs(touchEndX - touchStartX) > 50) {
            handleGesture();
        }
    });

    const days = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
// ... existing code below ...

    function render() {
        grid.innerHTML = '';
        const realToday = new Date().toDateString();

        let d = new Date(viewDate);
        d.setDate(d.getDate() - d.getDay());

        for (let i = 0; i < 7; i++) {
            const isToday = d.toDateString() === realToday;
            const iso = d.toISOString().split('T')[0];
            const dateNum = d.getDate();
            const dayName = days[i];

            const wrap = document.createElement('div');
            wrap.className = 'day' + (isToday ? ' today' : ' collapsed');
            if (currentDirection === 'left') wrap.classList.add('animate-left');
            if (currentDirection === 'right') wrap.classList.add('animate-right');

            const head = document.createElement('div');
            head.className = 'header';

            const daySpan = document.createElement('span');
            daySpan.textContent = dayName.charAt(0).toUpperCase() + dayName.slice(1);

            const dateSpan = document.createElement('span');
            dateSpan.textContent = ` ${dateNum}`;
            dateSpan.style.fontSize = '16px';
            dateSpan.style.fontWeight = '400';

            if (isToday) {
                const todaySpan = document.createElement('span');
                todaySpan.textContent = ' today';
                todaySpan.style.fontSize = '14px';
                todaySpan.style.fontWeight = '400';
                head.appendChild(daySpan);
                head.appendChild(dateSpan);
                head.appendChild(todaySpan);
            } else {
                head.appendChild(daySpan);
                head.appendChild(dateSpan);
            }

            const input = document.createElement('textarea');
            input.value = localStorage.getItem(iso) || '';
            input.placeholder = '>';
            input.addEventListener('input', e => localStorage.setItem(iso, e.target.value));

            head.onclick = () => wrap.classList.toggle('collapsed');

            wrap.appendChild(head);
            wrap.appendChild(input);
            grid.appendChild(wrap);

            d.setDate(d.getDate() + 1);
        }
        currentDirection = null;
    }

    // Navigation handlers removed

    render();
</script>

</body>
</html>
